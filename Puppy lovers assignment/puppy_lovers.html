<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puppy Lovers Page</title>
    <link rel="stylesheet" href="puppy_lovers.css">
</head>
<body>

<!-- Header -->
<header>
    <h1>Puppy lovers page</h1>
</header>

<!-- Hero Image -->
<section class="hero">
    <img src="banner-puppies.jpg" alt="Puppies in basket">
</section>

<!-- First Gallery -->
<section class="gallery">
    <div class="box">
        <img src="puppy-1.jpg" alt="White puppy">
    </div>

    <div class="missing">
        Puppy<br>
        missing<br>
        here!!
    </div>

    <div class="box">
        <img src="puppy-2.jpg" alt="Black puppy">
    </div>
</section>

<!-- Heading -->
<section class="title">
    <h2>More Puppies</h2>
</section>

<!-- Second Gallery -->
<section class="gallery gallery-bottom">
    <div class="large-box">
        <img src="puppy-3.jpg" alt="Brown puppy">
    </div>

    <div class="large-box">
        <img src="puppy-4.jpg" alt="White dog">
    </div>
</section>

<!-- Footer -->
<footer>
    <h3>Developed by: Leykun</h3>
</footer>

</body>
</html>
